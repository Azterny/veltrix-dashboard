<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veltrix Bot | Dashboard</title>
    <style>
        :root {
            --bg-main: #1e1e2e;
            --bg-card: #313244;
            --text-main: #cdd6f4;
            --accent: #89b4fa;
            --success: #a6e3a1;
            --danger: #f38ba8;
            --border: #45475a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        /* --- STYLES DU LOGIN --- */
        #login-section {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }

        input[type="password"] {
            width: 80%;
            padding: 10px;
            margin: 15px 0;
            border-radius: 5px;
            border: 1px solid var(--border);
            background-color: var(--bg-main);
            color: var(--text-main);
        }

        /* --- STYLES DU DASHBOARD --- */
        #dashboard-section {
            display: none; /* Caché par défaut */
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            gap: 20px;
            grid-template-columns: 1fr;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-card);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        h1 { margin: 0; font-size: 1.5rem; color: var(--accent); }

        .card {
            background-color: var(--bg-card);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .card-header h2 { margin: 0; font-size: 1.2rem; }

        button {
            background-color: var(--accent);
            color: var(--bg-main);
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }

        .logs-container {
            background-color: #11111b;
            color: var(--success);
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            border-radius: 5px;
            height: 300px;
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); }
        th { color: var(--accent); }
        
        .logout-btn { background-color: var(--danger); }
    </style>
</head>
<body>

    <!-- ÉCRAN DE CONNEXION -->
    <div id="login-section" class="card">
        <h2>Accès Veltrix Dashboard</h2>
        <input type="password" id="password-input" placeholder="Mot de passe API">
        <br>
        <button onclick="login()">Se connecter</button>
        <p id="login-error" style="color: var(--danger); display: none; margin-top: 15px;">Mot de passe incorrect ou API inaccessible.</p>
    </div>

    <!-- DASHBOARD (Caché au départ) -->
    <div id="dashboard-section" style="display: none;">
        <header>
            <h1>Veltrix Dashboard</h1>
            <button class="logout-btn" onclick="logout()">Déconnexion</button>
        </header>

        <div class="card">
            <div class="card-header">
                <h2>Terminal Logs</h2>
                <button onclick="refreshLogs()">Actualiser les Logs</button>
            </div>
            <div class="logs-container" id="logs-window">
                [SYSTEM] En attente de récupération des logs...
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>Aperçu de la Base de Données</h2>
                <button onclick="refreshDB()">Charger la BDD</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Utilisateur</th>
                        <th>Action</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="db-content">
                    <tr><td colspan="4" style="text-align: center; color: #a6adc8;">Cliquez sur "Charger la BDD"</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // --- ADRESSE DE TON API LOCALE ---
        const API_URL = "https://veltrix.brawl-track.com"; 

        // Vérifie au chargement si on est déjà connecté
        window.onload = () => {
            if (sessionStorage.getItem('api_token')) {
                showDashboard();
            }
        };

        // Fonction de connexion
        async function login() {
            const pwd = document.getElementById('password-input').value;
            const errorMsg = document.getElementById('login-error');
            
            try {
                // On teste le mot de passe en appelant la route des stats
                const response = await fetch(`${API_URL}/api/stats`, {
                    headers: { 'Authorization': pwd }
                });

                if (response.ok) {
                    sessionStorage.setItem('api_token', pwd);
                    errorMsg.style.display = 'none';
                    showDashboard();
                } else {
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = "Erreur de connexion au serveur.";
            }
        }

        // Fonction de déconnexion
        function logout() {
            sessionStorage.removeItem('api_token');
            document.getElementById('dashboard-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('password-input').value = '';
        }

        // Affiche le dashboard et charge les données
        function showDashboard() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard-section').style.display = 'grid';
            refreshLogs();
        }

        // Récupérer le token pour les requêtes
        function getAuthHeaders() {
            return { 'Authorization': sessionStorage.getItem('api_token') };
        }

        // Rafraîchir les logs
        async function refreshLogs() {
            const logsWindow = document.getElementById('logs-window');
            try {
                const response = await fetch(`${API_URL}/api/logs`, { headers: getAuthHeaders() });
                if (response.status === 401) return logout(); // Expulsé si mdp changé
                
                const data = await response.json();
                logsWindow.innerHTML = data.logs.join('<br>');
                logsWindow.scrollTop = logsWindow.scrollHeight;
            } catch (error) {
                logsWindow.innerHTML = "<span style='color: var(--danger);'>[ERREUR] Impossible de lire les logs.</span>";
            }
        }

        // Rafraîchir la BDD
        async function refreshDB() {
            const dbContent = document.getElementById('db-content');
            dbContent.innerHTML = "<tr><td colspan='4'>Chargement en cours...</td></tr>";

            try {
                const response = await fetch(`${API_URL}/api/database`, { headers: getAuthHeaders() });
                if (response.status === 401) return logout();

                const data = await response.json();
                let html = '';
                data.entries.forEach(row => {
                    html += `<tr><td>${row.id || '-'}</td><td>${row.user || '-'}</td><td>${row.action || '-'}</td><td>${row.date || '-'}</td></tr>`;
                });
                dbContent.innerHTML = html || "<tr><td colspan='4'>La base de données est vide.</td></tr>";
            } catch (error) {
                dbContent.innerHTML = "<tr><td colspan='4' style='color: var(--danger);'>Erreur de connexion.</td></tr>";
            }
        }
    </script>
</body>
</html>
