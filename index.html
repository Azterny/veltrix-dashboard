<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veltrix Bot | Dashboard</title>
    <style>
        * { box-sizing: border-box; }
        
        :root {
            --bg-main: #1e1e2e;
            --bg-card: #313244;
            --text-main: #cdd6f4;
            --accent: #89b4fa;
            --success: #a6e3a1;
            --danger: #f38ba8;
            --warning: #f9e2af;
            --border: #45475a;
        }

        /* Hauteur fixe 100vh + flexbox pour ne pas déborder de l'écran */
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #login-section { max-width: 400px; margin: auto; text-align: center; }
        input[type="password"] { width: 100%; padding: 10px; margin: 15px 0; border-radius: 5px; border: 1px solid var(--border); background: var(--bg-main); color: white; }
        
        #dashboard-section {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
            gap: 15px;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            background-color: var(--bg-card); padding: 15px 20px; border-radius: 8px;
        }
        h1 { margin: 0; font-size: 1.5rem; color: var(--accent); }

        .controls { display: flex; gap: 10px; background-color: var(--bg-card); padding: 10px; border-radius: 8px; justify-content: center; }
        
        button {
            background-color: var(--accent); color: var(--bg-main); border: none;
            padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        button:hover { opacity: 0.8; }
        .btn-stop { background-color: var(--danger); }
        .btn-restart { background-color: var(--warning); color: #111; }

        .panels-container {
            display: flex; gap: 15px; flex: 1; overflow: hidden;
        }

        .card {
            background-color: var(--bg-card); border-radius: 8px;
            display: flex; flex-direction: column; flex: 1; overflow: hidden;
        }

        .card-header {
            padding: 15px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .card-header h2 { margin: 0; font-size: 1.1rem; }

        /* Conteneurs avec Scroll internes */
        .scroll-area {
            flex: 1; overflow-y: auto; padding: 15px;
        }

        .logs-container {
            background-color: #11111b; color: var(--success);
            font-family: monospace; font-size: 0.9rem; white-space: pre-wrap;
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid var(--border); }
        th { color: var(--accent); position: sticky; top: 0; background: var(--bg-card); }
    </style>
</head>
<body>

    <div id="login-section" class="card" style="padding: 20px; margin-top: 10vh;">
        <h2>Accès Veltrix Dashboard</h2>
        <input type="password" id="password-input" placeholder="Mot de passe API">
        <button onclick="login()">Se connecter</button>
        <p id="login-error" style="color: var(--danger); display: none;">Mot de passe incorrect.</p>
    </div>

    <div id="dashboard-section">
        <header>
            <h1>Veltrix Dashboard</h1>
            <div style="display: flex; gap: 15px; align-items: center;">
                <span id="status-text">État: Vérification...</span>
                <button class="btn-stop" onclick="logout()">Déconnexion</button>
            </div>
        </header>

        <!-- Boutons de gestion -->
        <div class="controls">
            <button onclick="sendAction('start')">▶ Démarrer</button>
            <button class="btn-restart" onclick="sendAction('restart')">↻ Redémarrer</button>
            <button class="btn-stop" onclick="sendAction('stop')">■ Arrêter</button>
        </div>

        <div class="panels-container">
            <!-- Zone Logs -->
            <div class="card">
                <div class="card-header">
                    <h2>Terminal Logs</h2>
                    <button onclick="refreshLogs()">Actualiser</button>
                </div>
                <div class="scroll-area logs-container" id="logs-window">En attente...</div>
            </div>

            <!-- Zone BDD -->
            <div class="card">
                <div class="card-header">
                    <h2 id="db-title">Base de Données</h2>
                    <button onclick="refreshDB()">Actualiser</button>
                </div>
                <div class="scroll-area" style="padding: 0;">
                    <table id="db-table">
                        <tbody id="db-content">
                            <tr><td style="padding: 15px;">Cliquez sur Actualiser</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === METS LA VRAIE URL DE TON API ICI ===
        const API_URL = "https://api.ton-domaine.com"; 

        window.onload = () => { if (sessionStorage.getItem('api_token')) showDashboard(); };

        function getAuth() { return { 'Authorization': sessionStorage.getItem('api_token'), 'Content-Type': 'application/json' }; }

        async function login() {
            const pwd = document.getElementById('password-input').value;
            try {
                const res = await fetch(`${API_URL}/api/stats`, { headers: { 'Authorization': pwd } });
                if (res.ok) {
                    sessionStorage.setItem('api_token', pwd);
                    document.getElementById('login-error').style.display = 'none';
                    showDashboard();
                } else document.getElementById('login-error').style.display = 'block';
            } catch (e) { document.getElementById('login-error').style.display = 'block'; }
        }

        function logout() { sessionStorage.removeItem('api_token'); location.reload(); }

        function showDashboard() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard-section').style.display = 'flex';
            refreshAll();
        }

        function refreshAll() { refreshLogs(); refreshDB(); refreshStats(); }

        async function refreshStats() {
            try {
                const res = await fetch(`${API_URL}/api/stats`, { headers: getAuth() });
                const data = await res.json();
                document.getElementById('status-text').innerText = `État: ${data.botStatus} | CPU: ${data.cpu} | RAM: ${data.ram}`;
            } catch (e) {}
        }

        // Envoi des actions (Start/Stop/Restart)
        async function sendAction(action) {
            const actionFr = action === 'start' ? 'démarrer' : action === 'stop' ? 'arrêter' : 'redémarrer';
            if (!confirm(`Voulez-vous vraiment ${actionFr} le bot ?`)) return;
            
            try {
                const res = await fetch(`${API_URL}/api/action`, { method: 'POST', headers: getAuth(), body: JSON.stringify({ action }) });
                const data = await res.json();
                alert(data.message || data.error);
                setTimeout(refreshAll, 1000); // Rafraîchit après 1s
            } catch (e) { alert("Erreur d'exécution de l'action."); }
        }

        async function refreshLogs() {
            const logsWindow = document.getElementById('logs-window');
            try {
                const res = await fetch(`${API_URL}/api/logs`, { headers: getAuth() });
                if (res.status === 401) return logout();
                const data = await res.json();
                logsWindow.innerHTML = data.logs.join('\n');
                logsWindow.scrollTop = logsWindow.scrollHeight;
            } catch (e) { logsWindow.innerHTML = "[ERREUR] Impossible de lire les logs."; }
        }

        // DB Auto-adaptative
        async function refreshDB() {
            const table = document.getElementById('db-table');
            try {
                const res = await fetch(`${API_URL}/api/database`, { headers: getAuth() });
                const data = await res.json();
                
                if (data.error) {
                    table.innerHTML = `<tr><td style="color:var(--danger); padding:15px;">${data.error}</td></tr>`;
                    return;
                }

                document.getElementById('db-title').innerText = `Table : ${data.table}`;

                if (data.entries.length === 0) {
                    table.innerHTML = `<tr><td style="padding:15px;">Table vide.</td></tr>`;
                    return;
                }

                // Construit les colonnes HTML dynamiquement
                const colonnes = Object.keys(data.entries[0]);
                let thead = '<thead><tr>' + colonnes.map(c => `<th>${c}</th>`).join('') + '</tr></thead>';
                let tbody = '<tbody>' + data.entries.map(ligne => 
                    '<tr>' + colonnes.map(c => `<td>${ligne[c]}</td>`).join('') + '</tr>'
                ).join('') + '</tbody>';

                table.innerHTML = thead + tbody;
            } catch (e) { table.innerHTML = `<tr><td style="padding:15px; color:var(--danger);">Erreur réseau.</td></tr>`; }
        }
    </script>
</body>
</html>
