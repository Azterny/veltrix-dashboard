<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veltrix Bot | Dashboard</title>
    <style>
        :root {
            --bg-main: #1e1e2e;
            --bg-card: #313244;
            --text-main: #cdd6f4;
            --accent: #89b4fa;
            --success: #a6e3a1;
            --danger: #f38ba8;
            --border: #45475a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            gap: 20px;
            grid-template-columns: 1fr;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-card);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        h1 { margin: 0; font-size: 1.5rem; color: var(--accent); }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }

        .dot {
            height: 12px; width: 12px;
            background-color: var(--success);
            border-radius: 50%;
            display: inline-block;
        }

        .card {
            background-color: var(--bg-card);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .card-header h2 { margin: 0; font-size: 1.2rem; }

        button {
            background-color: var(--accent);
            color: var(--bg-main);
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }

        /* Style pour la console des logs */
        .logs-container {
            background-color: #11111b;
            color: var(--success);
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            border-radius: 5px;
            height: 300px;
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        /* Style pour la base de données */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        th { color: var(--accent); }
    </style>
</head>
<body>

    <div class="container">
        <!-- En-tête -->
        <header>
            <h1>Veltrix Dashboard</h1>
            <div class="status">
                <span class="dot" id="status-dot"></span>
                <span id="status-text">Bot En Ligne</span>
            </div>
        </header>

        <!-- Section Logs -->
        <div class="card">
            <div class="card-header">
                <h2>Terminal Logs</h2>
                <button onclick="refreshLogs()">Actualiser les Logs</button>
            </div>
            <div class="logs-container" id="logs-window">
                [SYSTEM] Initialisation du dashboard...<br>
                [INFO] En attente de connexion avec l'API...
            </div>
        </div>

        <!-- Section Base de Données -->
        <div class="card">
            <div class="card-header">
                <h2>Aperçu de la Base de Données</h2>
                <button onclick="refreshDB()">Charger la BDD</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Utilisateur (Discord)</th>
                        <th>Action / Commande</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="db-content">
                    <tr>
                        <td colspan="4" style="text-align: center; color: #a6adc8;">
                            Cliquez sur "Charger la BDD" pour afficher les données.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // --- ADRESSE DE TON API LOCALE ---
        // Il faudra remplacer cette URL par l'adresse de ton API sur le PiZero (ex: ton tunnel Cloudflare pour l'API)
        const API_URL = "https://api.ton-domaine.com"; 

        // Fonction pour récupérer les logs
        async function refreshLogs() {
            const logsWindow = document.getElementById('logs-window');
            logsWindow.innerHTML += "<br>[SYS] Récupération des logs...";
            
            try {
                // Appel à ton API Node.js (dashboard-api.service)
                const response = await fetch(`${API_URL}/logs`);
                const data = await response.json();
                
                logsWindow.innerHTML = data.logs.join('<br>');
                // Scroll tout en bas automatiquement
                logsWindow.scrollTop = logsWindow.scrollHeight;
            } catch (error) {
                logsWindow.innerHTML += "<br><span style='color: #f38ba8;'>[ERREUR] Impossible de contacter l'API.</span>";
            }
        }

        // Fonction pour récupérer la base de données
        async function refreshDB() {
            const dbContent = document.getElementById('db-content');
            dbContent.innerHTML = "<tr><td colspan='4'>Chargement en cours...</td></tr>";

            try {
                const response = await fetch(`${API_URL}/database`);
                const data = await response.json();
                
                let html = '';
                data.entries.forEach(row => {
                    html += `<tr>
                        <td>${row.id}</td>
                        <td>${row.user}</td>
                        <td>${row.action}</td>
                        <td>${row.date}</td>
                    </tr>`;
                });
                dbContent.innerHTML = html || "<tr><td colspan='4'>La base de données est vide.</td></tr>";
            } catch (error) {
                dbContent.innerHTML = "<tr><td colspan='4' style='color: #f38ba8;'>Erreur de connexion à l'API.</td></tr>";
            }
        }
    </script>
</body>
</html>
